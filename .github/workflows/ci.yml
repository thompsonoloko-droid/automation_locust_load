name: CI — Unit Tests & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run unit tests every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Lint & formatting checks
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff isort

      - name: Check formatting with Black
        run: black --check --diff .

      - name: Lint with Ruff
        run: ruff check .

      - name: Check import order with isort
        run: isort --check-only --diff .

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Unit tests
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install locust requests python-dotenv pytest pytest-cov pytest-html

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit/ \
            --tb=short \
            --cov=common \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/coverage-html \
            --cov-fail-under=80 \
            -v
        env:
          TARGET_HOST: https://demoblaze.com
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: reports/coverage-html/
          retention-days: 7

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: reports/coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Smoke load test (short headless run — 10 users, 60s)
  # ─────────────────────────────────────────────────────────────────────────
  smoke-load:
    name: Smoke Load Test
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name != 'schedule'
    # Smoke load results are informational — endpoint reachability and
    # response times vary in ephemeral CI runners. Hard failures here
    # should not block merges; use nightly-endurance.yml for SLA gates.
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install locust requests python-dotenv

      - name: Run smoke load test (headless)
        run: |
          locust -f tests/test_smoke_load.py \
            --headless \
            --users 5 \
            --spawn-rate 1 \
            --run-time 30s \
            --host https://demoblaze.com \
            --html reports/smoke-report.html \
            --csv reports/smoke
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-load-report
          path: reports/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────
  # 4. API performance test (short headless run)
  # ─────────────────────────────────────────────────────────────────────────
  api-perf:
    name: API Performance Test
    runs-on: ubuntu-latest
    needs: smoke-load
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # API performance results are informational in CI. SLA gating for
    # production requires stable credentials and controlled load.
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install locust requests python-dotenv

      - name: Run API performance test (headless)
        run: |
          locust -f tests/test_api_performance.py \
            --headless \
            --users 10 \
            --spawn-rate 2 \
            --run-time 60s \
            --host https://api.demoblaze.com \
            --html reports/api-perf-report.html \
            --csv reports/api-perf
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload API performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-performance-report
          path: reports/
          retention-days: 14
