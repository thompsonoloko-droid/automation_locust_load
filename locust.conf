# Locust default configuration
# CLI flags specified here apply when running `locust -f …` without overrides.
# All values can be overridden by passing the corresponding CLI flag.

# Default target host
host = https://demoblaze.com

# Default load parameters (conservative — suitable for CI smoke runs)
users = 20
spawn-rate = 2
run-time = 2m

# Headless mode (set to false to open the web UI by default)
headless = false

# HTML report output
html = reports/locust-report.html

# CSV stats output (will generate stats, failures, exceptions CSVs)
csv = reports/locust

# Logging
loglevel = INFO
